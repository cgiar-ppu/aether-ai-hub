name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names co-scientist-backend --region eu-west-1 || \
          aws ecr create-repository --repository-name co-scientist-backend --region eu-west-1 --image-scanning-configuration scanOnPush=true

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t co-scientist-backend .

      - name: Tag and push to ECR
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/co-scientist-backend:latest
          docker tag co-scientist-backend:latest $IMAGE_URI
          docker push $IMAGE_URI

      - name: Deploy to EC2 via SSM
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/co-scientist-backend:latest
          aws ssm send-command \
            --instance-ids ${{ secrets.BACKEND_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com',
              'docker pull $IMAGE_URI',
              'docker stop backend || true',
              'docker rm backend || true',
              'docker run -d --name backend -p 8000:8000 --env-file /opt/backend/.env --restart unless-stopped $IMAGE_URI'
            ]" \
            --region ${{ env.AWS_REGION }}
